###################################################
# ConfigMap — Prometheus configuration
###################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: dev-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'todo-service'
        static_configs:
          - targets: ['backend:3000']
        metrics_path: '/metrics'

      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:3001']
        metrics_path: '/metrics'
---
###################################################
# Deployment — Prometheus
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
###################################################
# Service — Prometheus
###################################################
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: dev-cloud
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: LoadBalancer
