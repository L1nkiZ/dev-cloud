apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: client:latest
          env:
            - name: VITE_BACKEND_URL
              value: http://backend:3000
            - name: VITE_AUTH_SERVICE_URL
              value: http://auth-service:3001
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: dev-cloud
  labels:
    app: client
spec:
  type: LoadBalancer
  selector:
    app: client
  ports:
    - name: http
      port: 5173
      targetPort: 5173
      protocol: TCP