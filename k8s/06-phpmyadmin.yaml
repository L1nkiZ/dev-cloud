###################################################
# Deployment — phpMyAdmin
# Web UI to browse and manage the MySQL database.
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:latest
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: MYSQL_HOST
            - name: PMA_USER
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: MYSQL_USER
            - name: PMA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-cloud-secret
                  key: MYSQL_PASSWORD
---
###################################################
# Service — phpMyAdmin (LoadBalancer)
# Accessible at http://localhost:8080
###################################################
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
  namespace: dev-cloud
spec:
  selector:
    app: phpmyadmin
  ports:
    - name: http
      port: 8080
      targetPort: 80
  type: LoadBalancer
