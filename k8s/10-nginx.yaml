###################################################
# ConfigMap — Nginx reverse proxy
# Route le trafic entrant :
#   /api  → backend:3000  (API Node.js)
#   /     → client:80     (React SPA)
###################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
  namespace: dev-cloud
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      upstream client {
        server client:80;
      }

      upstream backend {
        server backend:3000;
      }

      server {
        listen 80;

        location /api {
          proxy_pass         http://backend;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
          proxy_pass         http://client;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
        }
      }
    }
---
###################################################
# Deployment — Nginx reverse proxy
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-proxy-config
---
###################################################
# Service — Nginx (LoadBalancer)
# Point d'entrée unique de l'application sur port 80.
# Docker Desktop expose automatiquement sur localhost:80.
###################################################
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: dev-cloud
spec:
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer
