apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-nginx
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-nginx
  template:
    metadata:
      labels:
        app: gateway-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: config
          configMap:
            name: nginx-gateway-config

---

apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: dev-cloud
spec:
  type: LoadBalancer
  selector:
    app: gateway-nginx
  ports:
    - name: http
      port: 80
      targetPort: 80