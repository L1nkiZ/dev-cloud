###################################################
# Deployment — Auth Service (port 3001)
# Service interne uniquement, appelé par le backend.
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: acr-secret
      initContainers:
        - name: wait-for-mysql
          image: busybox:latest
          command:
            - sh
            - -c
            - "until nc -z -w3 mysql 3306; do echo 'Waiting for MySQL...'; sleep 3; done"
      containers:
        - name: auth-service
          image: asjhwkregistry.azurecr.io/auth-service:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: MYSQL_USER
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: MYSQL_DB
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-cloud-secret
                  key: MYSQL_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dev-cloud-secret
                  key: JWT_SECRET
            - name: JWT_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: JWT_EXPIRY
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: FRONTEND_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: NODE_ENV
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
###################################################
# Service — Auth Service (ClusterIP, interne uniquement)
###################################################
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dev-cloud
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
