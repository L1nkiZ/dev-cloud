###################################################
# ConfigMap — Grafana provisioning (datasource)
###################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: dev-cloud
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
###################################################
# Deployment — Grafana
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
---
###################################################
# Service — Grafana
###################################################
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dev-cloud
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3333
      targetPort: 3000
  type: LoadBalancer
