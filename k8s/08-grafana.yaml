###################################################
# ConfigMap — Grafana datasource Prometheus
###################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: dev-cloud
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
###################################################
# ConfigMap — Grafana dashboard provisioning
###################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: dev-cloud
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'dev-cloud'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /etc/grafana/provisioning/dashboards
---
###################################################
# PersistentVolumeClaim — Grafana data
###################################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: dev-cloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
###################################################
# Deployment — Grafana
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
###################################################
# Service — Grafana (LoadBalancer → port 3333)
###################################################
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dev-cloud
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3333
      targetPort: 3000
  type: LoadBalancer
