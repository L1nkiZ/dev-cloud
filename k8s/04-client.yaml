###################################################
# Deployment — Client (React Frontend)
# The client frontend connects to backend and auth-service.
###################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: dev-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: frontend:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: VITE_API_URL
            - name: VITE_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: VITE_BACKEND_URL
            - name: VITE_AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: VITE_AUTH_SERVICE_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: dev-cloud-config
                  key: NODE_ENV
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
###################################################
# Service — Client (LoadBalancer)
# Exposes the frontend on port 80 (mapped from 5173)
###################################################
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: dev-cloud
spec:
  selector:
    app: client
  ports:
    - name: http
      port: 80
      targetPort: 5173
  type: LoadBalancer
