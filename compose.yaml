###################################################
# Dev environment — Microservices architecture
# Services: proxy, auth-service, backend (todo), client, mysql, phpmyadmin,
#           prometheus, grafana
###################################################
services:

  ###################################################
  # Service: proxy (Traefik)
  ###################################################
  proxy:
    image: traefik:v3.6
    command:
      - --providers.docker
      - --entrypoints.web.address=:80
    ports:
      - 81:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ###################################################
  # Service: auth-service (port 3001)
  ###################################################
  auth-service:
    image: auth-service:latest
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      target: auth-dev
    environment:
      PORT: 3001
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DB: todos
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRY: 7d
      FRONTEND_URL: http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - path: ./auth-service/src
          action: sync
          target: /usr/local/app/src
        - path: ./auth-service/package.json
          action: rebuild
    labels:
      traefik.enable: "false"

  ###################################################
  # Service: backend (todo-service, port 3000)
  ###################################################
  backend:
    image: backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend-dev
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DB: todos
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
    develop:
      watch:
        - path: ./backend/src
          action: sync
          target: /usr/local/app/src
        - path: ./backend/package.json
          action: rebuild
    labels:
      traefik.enable: "true"
      traefik.http.routers.backend.rule: Host(`localhost`) && PathPrefix(`/api`)
      traefik.http.routers.backend.priority: "5"
      traefik.http.routers.backend.entrypoints: web
      traefik.http.routers.backend.service: backend
      traefik.http.services.backend.loadbalancer.server.port: 3000

  ###################################################
  # Service: client (React frontend)
  ###################################################
  client:
    image: client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      target: client-dev
    environment:
      VITE_BACKEND_URL: http://backend:3000
    develop:
      watch:
        - path: ./client/src
          action: sync
          target: /usr/local/app/src
        - path: ./client/package.json
          action: rebuild
    labels:
      traefik.http.routers.client.rule: Host(`localhost`)
      traefik.http.services.client.loadbalancer.server.port: 5173

  ###################################################
  # Service: mysql
  ###################################################
  mysql:
    image: mysql:9.3
    volumes:
      - todo-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: todos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # Service: phpmyadmin
  ###################################################
  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: secret
    labels:
      traefik.http.routers.phpmyadmin.rule: Host(`db.localhost`)
      traefik.http.services.phpmyadmin.loadbalancer.server.port: 80

  ###################################################
  # Service: prometheus
  ###################################################
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
      - auth-service
    labels:
      traefik.http.routers.prometheus.rule: Host(`prometheus.localhost`)
      traefik.http.services.prometheus.loadbalancer.server.port: 9090

  ###################################################
  # Service: grafana
  ###################################################
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3338:3000"
    depends_on:
      - prometheus
    labels:
      traefik.http.routers.grafana.rule: Host(`grafana.localhost`)
      traefik.http.services.grafana.loadbalancer.server.port: 3000

volumes:
  todo-mysql-data:
  grafana-data:
