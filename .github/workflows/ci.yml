name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.project }}

      - name: Run lint
        run: npm --prefix ${{ matrix.project }} run lint

  dependency-check:
    name: Dependency Audit (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.project }}

      - name: Run dependency audit
        run: npm --prefix ${{ matrix.project }} audit --omit=dev --audit-level=critical

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Sonar credentials
        id: sonar
        shell: bash
        run: |
          if [ -n "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "token=${{ secrets.SONAR_TOKEN }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.SONAR_TOKEN_DEFAULT }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "token=${{ secrets.SONAR_TOKEN_DEFAULT }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: ${{ steps.sonar.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ steps.sonar.outputs.token }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Run backend tests
        run: npm --prefix backend test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix client

      - name: Build backend
        run: npm --prefix backend run build

      - name: Start backend API for frontend tests
        run: |
          mkdir -p backend/.tmp-ci
          PORT=3000 SQLITE_DB_LOCATION="$GITHUB_WORKSPACE/backend/.tmp-ci/todo.db" node backend/dist/index.js &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/greeting > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Backend did not start in time"
          exit 1

      - name: Run frontend tests
        env:
          TEST_BACKEND_URL: http://127.0.0.1:3000
        run: npm --prefix client test

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${BACKEND_PID}" ]; then
            kill "$BACKEND_PID" || true
          fi

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Build backend
        run: npm --prefix backend run build

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix client

      - name: Build frontend
        run: npm --prefix client run build
