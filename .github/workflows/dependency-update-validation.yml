name: Dependency Update Validation

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-updated-dependencies:
    name: Validate Weekly Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix client

      - name: Simulate dependency lockfile updates
        run: |
          npm --prefix backend update --package-lock-only
          npm --prefix client update --package-lock-only

      - name: Re-install with updated lockfiles
        run: |
          npm ci --prefix backend
          npm ci --prefix client

      - name: Run backend tests
        run: npm --prefix backend test

      - name: Build backend
        run: npm --prefix backend run build

      - name: Start backend API for frontend tests
        run: |
          mkdir -p backend/.tmp-ci
          PORT=3000 SQLITE_DB_LOCATION="$GITHUB_WORKSPACE/backend/.tmp-ci/todo.db" node backend/dist/index.js &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/greeting > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Backend did not start in time"
          exit 1

      - name: Run frontend tests
        env:
          TEST_BACKEND_URL: http://127.0.0.1:3000
        run: npm --prefix client test

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${BACKEND_PID}" ]; then
            kill "$BACKEND_PID" || true
          fi
