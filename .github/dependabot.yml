version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    target-branch: master
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    target-branch: master
    open-pull-requests-limit: 10
